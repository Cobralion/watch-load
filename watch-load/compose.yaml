services:
  watch-load:
    build:
      context: .
    secrets:
      - db-password
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      AUTH_TRUST_HOST: "true"
      JWT_APP_ISSUER: app
      JWT_APP_AUDIENCE: app
      DB_HOST: db
      DB_PASSWORD_FILE: /run/secrets/db-password
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy

  caddy:
    image: caddy:2
    restart: always
    env_file:
      - .env.production
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - watch-load

  db:
    image: postgres:16-alpine
    restart: always
    user: postgres
    secrets:
      - db-password
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/db-password
    expose:
      - "5432"
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${DB_USER}", "-d", "${DB_NAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  db-backup:
    image: prodrigestivill/postgres-backup-local:16
    restart: always
    depends_on:
      db:
        condition: service_healthy
    secrets:
      - db-password
    volumes:
      - ./backups/postgres:/backups
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD_FILE: /run/secrets/db-password
      POSTGRES_EXTRA_OPTS: "-Z9 --schema=public --blobs"
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 14
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      HEALTHCHECK_PORT: 8080

volumes:
  db-data:
  caddy-data:
  caddy-config:

secrets:
  db-password:
    file: ${DB_PASSWORD_FILE}